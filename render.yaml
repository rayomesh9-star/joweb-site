databases:
  - name: joweb_db
    databaseName: joweb
    user: joweb

services:
  - type: web
    name: joweb-site
    env: node
    region: oregon
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: joweb_db
          property: connectionString
